<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin | Kelola Portofolio Daffa</title>
  <meta name="description" content="Panel kontrol admin premium untuk mengelola profil, keahlian, dan riwayat hidup portofolio.">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="assets/css/admin.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="admin-layout">
    
    <!-- --- SIDEBAR NAV --- -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        ⚡ Daffa<span>.</span> <small>Admin</small>
      </div>
      
      <nav class="sidebar-menu">
        <button class="menu-item active" data-target="panel-profile" id="btn-tab-profile">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Kelola Profil
        </button>
        <button class="menu-item" data-target="panel-skills" id="btn-tab-skills">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
          Kelola Keahlian
        </button>
        <button class="menu-item" data-target="panel-timeline" id="btn-tab-timeline">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          Kelola Riwayat
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <a href="index.html" class="btn btn-view-portfolio">
          Lihat Portofolio
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
      </div>
    </aside>

    <!-- --- MAIN CONTENT AREA --- -->
    <main class="main-content">
      
      <!-- Top header bar -->
      <header class="main-header">
        <div class="header-title">
          <span id="greeting-text">Selamat Datang, Admin</span>
          <h1 id="panel-title-text">Kelola Profil Portofolio</h1>
        </div>
        <div class="header-profile">
          <div class="avatar-sm" id="admin-avatar">DA</div>
          <span class="admin-name" id="admin-header-name">Daffa</span>
        </div>
      </header>

      <!-- Panel Content Container -->
      <div class="panel-container">
        
        <!-- ================= PANEL 1: PROFILE ================= -->
        <section class="admin-panel active" id="panel-profile">
          <div class="card">
            <h2 class="card-title">Informasi Dasar Profil</h2>
            <form id="form-profile">
              <div class="form-grid">
                <div class="form-group">
                  <label for="profile-name" class="form-label">Nama Lengkap</label>
                  <input type="text" id="profile-name" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="profile-title" class="form-label">Jabatan Pekerjaan (Title)</label>
                  <input type="text" id="profile-title" class="form-input" required>
                </div>
                <div class="form-group form-fullwidth">
                  <label for="profile-bio" class="form-label">Biografi Singkat</label>
                  <textarea id="profile-bio" class="form-input form-textarea" required></textarea>
                </div>
                <div class="form-group">
                  <label for="profile-location" class="form-label">Lokasi Domisili</label>
                  <input type="text" id="profile-location" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="profile-email" class="form-label">Alamat Email Kontak</label>
                  <input type="email" id="profile-email" class="form-input" required>
                </div>
                <div class="form-group">
                  <label for="profile-avatar" class="form-label">Link Gambar Avatar (Kosongkan untuk Inisial)</label>
                  <input type="text" id="profile-avatar" class="form-input" placeholder="https://example.com/avatar.jpg">
                </div>
                <div class="form-group">
                  <label for="profile-resume" class="form-label">Link CV / Resume PDF</label>
                  <input type="text" id="profile-resume" class="form-input" placeholder="https://example.com/cv.pdf">
                </div>
              </div>

              <h2 class="card-title" style="margin-top: 3rem;">Jejaring Sosial</h2>
              <div class="form-grid">
                <div class="form-group">
                  <label for="profile-github" class="form-label">GitHub URL</label>
                  <input type="url" id="profile-github" class="form-input">
                </div>
                <div class="form-group">
                  <label for="profile-linkedin" class="form-label">LinkedIn URL</label>
                  <input type="url" id="profile-linkedin" class="form-input">
                </div>
                <div class="form-group">
                  <label for="profile-instagram" class="form-label">Instagram URL</label>
                  <input type="url" id="profile-instagram" class="form-input">
                </div>
                <div class="form-group">
                  <label for="profile-twitter" class="form-label">Twitter / X URL</label>
                  <input type="url" id="profile-twitter" class="form-input">
                </div>
              </div>

              <div class="form-actions" style="margin-top: 3rem;">
                <button type="submit" class="btn btn-primary" id="btn-save-profile">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                  Simpan Perubahan
                </button>
                <button type="button" class="btn btn-secondary" id="btn-reset-profile">Reset ke Default</button>
              </div>
            </form>
          </div>
        </section>

        <!-- ================= PANEL 2: SKILLS ================= -->
        <section class="admin-panel" id="panel-skills">
          <div class="admin-columns">
            
            <!-- Left Side: Form Add -->
            <div class="card">
              <h2 class="card-title" id="skill-form-title">Tambah Keahlian Baru</h2>
              <form id="form-skill">
                <input type="hidden" id="skill-id-hidden">
                <div class="form-group">
                  <label for="skill-name" class="form-label">Nama Teknologi</label>
                  <input type="text" id="skill-name" class="form-input" placeholder="Contoh: React.js" required>
                </div>
                <div class="form-group">
                  <label for="skill-category" class="form-label">Kategori</label>
                  <select id="skill-category" class="form-input" required>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="Database">Database</option>
                    <option value="DevOps">DevOps</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Tingkat Keahlian: <span id="skill-level-val" style="color: var(--accent); font-weight:700;">80%</span></label>
                  <input type="range" id="skill-level" min="1" max="100" value="80" class="form-range">
                </div>
                <div class="form-actions" style="margin-top: 2rem;">
                  <button type="submit" class="btn btn-primary" id="btn-save-skill">
                    Tambah Keahlian
                  </button>
                  <button type="button" class="btn btn-secondary" id="btn-cancel-skill" style="display: none;">
                    Batal
                  </button>
                </div>
              </form>
            </div>

            <!-- Right Side: Current Skills List -->
            <div class="card">
              <h2 class="card-title">Daftar Keahlian Aktif</h2>
              <div class="skills-manager-list" id="skills-manager-target">
                <!-- Dynamically rendered in JS -->
              </div>
            </div>
            
          </div>
        </section>

        <!-- ================= PANEL 3: TIMELINE ================= -->
        <section class="admin-panel" id="panel-timeline">
          
          <!-- Sub tab switchers inside riwayat page -->
          <div class="timeline-tabs">
            <button class="tab-btn active" data-type="experience" id="tab-btn-exp">Pengalaman Kerja</button>
            <button class="tab-btn" data-type="education" id="tab-btn-edu">Pendidikan & Sertifikasi</button>
          </div>

          <div class="admin-columns">
            
            <!-- Left Side: Form Add / Edit -->
            <div class="card">
              <h2 class="card-title" id="timeline-form-title">Tambah Pengalaman Baru</h2>
              <form id="form-timeline">
                <input type="hidden" id="timeline-id-hidden">
                <input type="hidden" id="timeline-type-hidden" value="experience">
                
                <!-- Dynamic fields based on type -->
                <div id="timeline-fields-target">
                  <!-- JS injected template -->
                </div>
                
                <div class="form-actions" style="margin-top: 2rem;">
                  <button type="submit" class="btn btn-primary" id="btn-save-timeline">
                    Simpan Riwayat
                  </button>
                  <button type="button" class="btn btn-secondary" id="btn-cancel-timeline" style="display: none;">
                    Batal
                  </button>
                </div>
              </form>
            </div>

            <!-- Right Side: Current List -->
            <div class="card">
              <h2 class="card-title" id="timeline-list-title">Riwayat Aktif</h2>
              <div class="timeline-manager-list" id="timeline-manager-target">
                <!-- Dynamically rendered in JS -->
              </div>
            </div>
            
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- --- FLOATING TOAST NOTIFICATION --- -->
  <div class="toast" id="toast-notif">
    <span>Perubahan disimpan secara real-time!</span>
  </div>

  <!-- --- JS CODE FILES --- -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/admin.js"></script>
</body>

</html>
