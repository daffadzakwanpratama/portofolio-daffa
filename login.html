<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daffa | Admin Login</title>
  <meta name="description" content="Halaman login terproteksi untuk masuk ke dashboard admin portofolio Daffa.">

  <!-- Link Google Fonts & Admin CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">

  <!-- Firebase SDK Compat & Config -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>

  <style>
    /* Styling Khusus Halaman Login */
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      background-color: var(--bg-primary);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-lg);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }

    .login-card:hover {
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.06);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .login-logo span {
      color: var(--accent);
    }

    .login-logo small {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background-color: var(--bg-tertiary);
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-sm);
      margin-left: 0.25rem;
      vertical-align: middle;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .password-input-wrapper {
      position: relative;
      width: 100%;
    }

    .password-input-wrapper .form-input {
      padding-right: 3rem; /* beri ruang untuk tombol perlihatkan sandi */
    }

    .btn-toggle-password {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      transition: var(--transition-fast);
    }

    .btn-toggle-password:hover {
      color: var(--text-primary);
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
    }

    .remember-me-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      user-select: none;
    }

    .remember-me-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      margin-top: 2rem;
      padding: 0.85rem;
      font-size: 0.95rem;
    }

    .login-footer-links {
      text-align: center;
      margin-top: 2rem;
      border-top: 1px solid var(--border-light);
      padding-top: 1.5rem;
    }

    .btn-back-portfolio {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-fast);
    }

    .btn-back-portfolio:hover {
      color: var(--text-primary);
      transform: translateX(-2px);
    }

    .error-box {
      background-color: rgba(255, 51, 51, 0.05);
      border: 1px solid rgba(255, 51, 51, 0.15);
      color: #ff3333;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    /* Animasi Getar (Shake Effect) Saat Salah Password */
    .shake-error {
      animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card" id="login-card">
      <header class="login-header">
        <div class="login-logo">
          Daffa<span>.</span> <small>Admin</small>
        </div>
        <div class="login-subtitle">Masuk untuk mengelola portofolio Anda</div>
      </header>

      <!-- Kotak Pesan Kesalahan -->
      <div class="error-box" id="error-box">
        Kata sandi yang Anda masukkan salah. Silakan coba lagi.
      </div>

      <form id="form-login">
        <!-- Input Email Admin -->
        <div class="form-group" style="margin-bottom: 1.25rem;">
          <label for="login-email" class="form-label">Email Admin</label>
          <input type="email" id="login-email" class="form-input" placeholder="admin@example.com" required autofocus>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Kata Sandi (Password)</label>
          <div class="password-input-wrapper">
            <input type="password" id="login-password" class="form-input" placeholder="Masukkan kata sandi admin" required>
            
            <button type="button" class="btn-toggle-password" id="btn-toggle-password" aria-label="Tampilkan sandi">
              <!-- Ikon Eye (Sembunyikan / Tampilkan) -->
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me-group">
            <input type="checkbox" class="remember-me-checkbox" id="remember-me">
            <span>Ingat Saya</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="btn-login-submit">
          Masuk Sekarang
        </button>
      </form>

      <div class="login-footer-links">
        <a href="index.html" class="btn-back-portfolio">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Kembali ke Portofolio
        </a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("form-login");
      const passwordInput = document.getElementById("login-password");
      const rememberCheckbox = document.getElementById("remember-me");
      const errorBox = document.getElementById("error-box");
      const loginCard = document.getElementById("login-card");
      
      const togglePasswordBtn = document.getElementById("btn-toggle-password");
      const eyeIcon = document.getElementById("eye-icon");

      // Redirect ke dashboard admin secara otomatis jika user sudah login di Firebase Auth
      const checkCurrentSession = () => {
        if (window.firebaseAuth) {
          window.firebaseAuth.onAuthStateChanged((user) => {
            if (user) {
              window.location.replace("admin.html");
            }
          });
        }
      };
      checkCurrentSession();

      // Fitur Tampilkan/Sembunyikan Sandi
      togglePasswordBtn.addEventListener("click", () => {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          // Ubah icon eye ke coret/off
          eyeIcon.innerHTML = `
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          `;
          togglePasswordBtn.setAttribute("aria-label", "Sembunyikan sandi");
        } else {
          passwordInput.type = "password";
          // Kembalikan ke icon eye standard
          eyeIcon.innerHTML = `
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          `;
          togglePasswordBtn.setAttribute("aria-label", "Tampilkan sandi");
        }
      });

      // Submit Form Login ke Firebase
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        // Hapus class shake dan error terdahulu
        loginCard.classList.remove("shake-error");
        errorBox.style.display = "none";

        const email = document.getElementById("login-email").value.trim();
        const password = passwordInput.value;
        const submitBtn = document.getElementById("btn-login-submit");

        const originalBtnText = submitBtn.innerText;
        submitBtn.disabled = true;
        submitBtn.innerText = "Memproses...";

        if (window.firebaseAuth) {
          // Set persistensi sesi berdasarkan checkbox Remember Me
          const persistence = rememberCheckbox.checked
            ? firebase.auth.Auth.Persistence.LOCAL
            : firebase.auth.Auth.Persistence.SESSION;

          window.firebaseAuth.setPersistence(persistence)
            .then(() => {
              // Sign in menggunakan kredensial Firebase
              return window.firebaseAuth.signInWithEmailAndPassword(email, password);
            })
            .then(() => {
              // Sukses login, arahkan ke admin.html
              window.location.replace("admin.html");
            })
            .catch((error) => {
              console.error("Gagal login ke Firebase Auth:", error);
              let errorMsg = "Gagal masuk. Periksa kembali email dan kata sandi Anda.";
              
              if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found" || error.code === "auth/invalid-login-credentials") {
                errorMsg = "Email atau Kata Sandi salah. Silakan coba lagi.";
              } else if (error.code === "auth/invalid-email") {
                errorMsg = "Format alamat email tidak valid.";
              } else if (error.code === "auth/too-many-requests") {
                errorMsg = "Terlalu banyak kegagalan login. Akun ditangguhkan sementara. Coba beberapa saat lagi.";
              }
              
              setTimeout(() => {
                loginCard.classList.add("shake-error");
                errorBox.innerText = errorMsg;
                errorBox.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
              }, 50);
            });
        } else {
          alert("Firebase SDK belum siap. Periksa konfigurasi Anda.");
          submitBtn.disabled = false;
          submitBtn.innerText = originalBtnText;
        }
      });
    });
  </script>
</body>

</html>
